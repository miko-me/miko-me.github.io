<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Miko | 個人開発者</title>
<meta name="description" content="趣味でiPhoneアプリを作っている個人開発者Mikoのホームページ。推し活手帳アプリ「推しテチョ」を作っています。ねむいけど、つくってる。">
<meta property="og:title" content="Miko | 個人開発者">
<meta property="og:description" content="ねむいけど、つくってる。推し活手帳アプリ「推しテチョ」の開発者です。">
<meta property="og:image" content="https://miko-me.github.io/assets/miko.png">
<meta property="og:url" content="https://miko-me.github.io/">
<meta name="twitter:card" content="summary">
<link rel="icon" href="assets/miko.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap">
<style>
  :root {
    --paper: #F6F0E5;
    --ink: #4A4553;
    --sub: #8B8494;
    --blue: #93AECB;
    --blue-deep: #7B96B5;
    --blush: #F2C4CE;
    --line: rgba(123, 150, 181, 0.35);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Zen Maru Gothic', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.9;
    overflow-x: hidden;
  }
  /* 水彩のにじみ */
  .wash { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: .5; }
  .b1 { top: -120px; left: -80px;  width: 420px; height: 380px; background: #C5D6E8; }
  .b2 { top: 30%;  right: -140px; width: 460px; height: 420px; background: #F4D9DF; opacity: .45; }
  .b3 { bottom: -160px; left: 10%; width: 520px; height: 400px; background: #E8E0C9; opacity: .5; }

  main { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; padding: 72px 24px 64px; }

  /* ---------- プロフィール ---------- */
  .me { text-align: center; }
  .icon-wrap { position: relative; width: 168px; margin: 0 auto; }
  .icon-wrap::before { /* にじみ座布団 */
    content: ""; position: absolute; inset: -18px;
    background: radial-gradient(closest-side, rgba(171, 194, 219, .5), transparent);
    border-radius: 50%;
  }
  .icon-wrap img {
    position: relative; width: 100%; border-radius: 50%; display: block;
    border: 5px solid #FFFDF8;
    box-shadow: 0 10px 30px rgba(123, 150, 181, .3);
  }
  .zzz {
    position: absolute; top: -6px; right: -30px;
    font-weight: 900; color: var(--blue-deep); opacity: .8;
    font-size: 22px; letter-spacing: 2px;
    animation: floatz 3.5s ease-in-out infinite;
  }
  @keyframes floatz {
    0%, 100% { transform: translateY(0) rotate(8deg); opacity: .45; }
    50% { transform: translateY(-9px) rotate(8deg); opacity: .9; }
  }
  @media (prefers-reduced-motion: reduce) { .zzz { animation: none; } }

  h1 { margin-top: 22px; font-size: 34px; font-weight: 900; letter-spacing: .08em; }
  .handle { font-size: 14px; color: var(--sub); }
  .handle a { color: var(--blue-deep); text-decoration: none; }
  .tagline {
    display: inline-block; margin-top: 14px;
    font-size: 15px; font-weight: 700; color: var(--blue-deep);
    background: rgba(171, 194, 219, .22);
    padding: 6px 20px; border-radius: 999px; letter-spacing: .12em;
  }
  .bio { margin-top: 18px; font-size: 15px; }

  /* ---------- 見出し ---------- */
  h2 {
    margin: 56px 0 20px; text-align: center;
    font-size: 17px; font-weight: 900; letter-spacing: .2em; color: var(--blue-deep);
  }
  h2::before, h2::after { content: "・"; color: var(--blush); }

  /* ---------- 作品カード ---------- */
  .work {
    display: flex; gap: 18px; align-items: center;
    background: #FFFDF8;
    border: 1.5px solid var(--line);
    border-radius: 18px;
    padding: 20px 22px;
    text-decoration: none; color: inherit;
    box-shadow: 0 6px 20px rgba(123, 150, 181, .12);
    transition: transform .2s ease, box-shadow .2s ease;
  }
  a.work:hover, a.work:focus-visible { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(123, 150, 181, .22); }
  .work + .work { margin-top: 16px; }
  .w-icon {
    flex: none; width: 64px; height: 64px; border-radius: 16px;
    display: grid; place-items: center; font-size: 30px;
    background: rgba(171, 194, 219, .25);
    overflow: hidden;
  }
  .w-icon img { width: 100%; height: 100%; display: block; }
  .w-body h3 { font-size: 17px; font-weight: 900; }
  .w-body p { font-size: 13px; color: var(--sub); margin-top: 2px; }
  .w-status {
    display: inline-block; margin-top: 6px; font-size: 11px; font-weight: 700;
    color: #A8763E; background: #F6E3C5; padding: 2px 12px; border-radius: 999px;
  }
  .work.tbd { border-style: dashed; background: transparent; box-shadow: none; }
  .work.tbd .w-icon { background: rgba(171, 194, 219, .25); box-shadow: none; }

  /* ---------- リンク ---------- */
  .links { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
  .links a {
    display: inline-block; text-decoration: none;
    font-size: 14px; font-weight: 700; color: var(--blue-deep);
    background: #FFFDF8; border: 1.5px solid var(--line);
    padding: 10px 26px; border-radius: 999px;
    transition: transform .2s ease;
  }
  .links a:hover, .links a:focus-visible { transform: translateY(-2px); background: rgba(171, 194, 219, .18); }
  a:focus-visible { outline: 2px solid var(--blue-deep); outline-offset: 3px; }

  footer { margin-top: 64px; text-align: center; font-size: 12px; color: var(--sub); }
  footer .moon { color: var(--blue-deep); }
</style>
</head>
<body>

<div class="wash" aria-hidden="true">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<main>

  <section class="me">
    <div class="icon-wrap">
      <img src="assets/miko.png" alt="Mikoのアイコン。猫耳フードをかぶった眠そうな子">
      <span class="zzz" aria-hidden="true">Z z .</span>
    </div>
    <h1>Miko</h1>
    <p class="handle"><a href="https://x.com/miko_me_kod">@miko_me_kod</a></p>
    <p class="tagline">ねむいけど、つくってる。</p>
    <p class="bio">趣味でiPhoneアプリを作っている個人開発者です。<br>
    SwiftUIと、推し活と、お昼寝が好き。<br>
    開発の裏側やつまずいたことをゆるく発信しています。</p>
  </section>

  <h2>つくったもの</h2>

  <a class="work" href="https://miko-me.github.io/oshitecho-support/">
    <div class="w-icon"><img src="assets/oshitecho.png" alt="推しテチョのアプリアイコン"></div>
    <div class="w-body">
      <h3>推しテチョ - 推し活手帳</h3>
      <p>推し活のお金・思い出・予定を、ぜんぶ1冊に。</p>
      <span class="w-status">App Store 審査中</span>
    </div>
  </a>

  <div class="work tbd">
    <div class="w-icon">💤</div>
    <div class="w-body">
      <h3>つぎのアプリ</h3>
      <p>構想中…（起きたら考えます）</p>
    </div>
  </div>

  <h2>リンク</h2>
  <div class="links">
    <a href="https://x.com/miko_me_kod">X（Twitter）</a>
    <a href="https://github.com/miko-me">GitHub</a>
    <a href="mailto:miko.me.kod@gmail.com">メール</a>
  </div>

  <footer>
    <p><span class="moon">🌙</span> © 2026 Miko-me</p>
  </footer>

</main>
</body>
</html>
